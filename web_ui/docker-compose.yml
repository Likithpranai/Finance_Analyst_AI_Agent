version: '3.8'
services:
  backend:
    build:
      context: ..
      dockerfile: web_ui/Dockerfile
      target: backend
    ports:
      - "8000:8000"
    volumes:
      - ../.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    restart: unless-stopped
